<!doctype html><html lang="en"><head><meta charset="UTF-8"/><link rel="icon" href="./app.ico"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta property="og:title" content="Terrarium"/><meta property="og:description" content="Terraria port for WebAssembly. Play Terraria online in the browser."/><meta name="description" content="Terraria port for WebAssembly. Play Terraria online in the browser."/><link rel="canonical" href="https://terraria.mercurywork.shop"/><title>Terrarium</title><script type="module" crossorigin src="./assets/index.js"></script><link rel="stylesheet" crossorigin href="./assets/index.css">
<script>
    // 1. Helper function to read a specific cookie by its name
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    // 2. Global Keydown Event: Checks cookies dynamically the moment ANY key is pressed
    document.addEventListener('keydown', function(event) {
        // Read the most up-to-date panic key and redirect link from cookies
        const userKey = getCookie('userKey');
        const userLink = getCookie('userLink');

        // If the pressed key matches your panic key, trigger the escape hatch
        if (userKey && event.key === userKey && userLink) {
            window.open(userLink, "_blank");
        }
    });

    // 3. Window load: Toggles UI checkboxes to match cookies if they exist on this page
    window.onload = function() {
        const warningElement = document.getElementById('warning');
        const blankElement = document.getElementById('Blank');

        if (warningElement) {
            warningElement.checked = (getCookie('warningEnabled') === 'true');
        }
        if (blankElement) {
            blankElement.checked = (getCookie('Blank') === 'true');
        }
    };

    // 4. Warn on page unload if the warning system is enabled
    window.onbeforeunload = function() {
        if (getCookie('warningEnabled') === 'true') {
            return "Are you sure you want to leave this page?";
        }
    };

    // 5. Automatic about:blank link interceptor
    (function() {
        function openInAboutBlank(url) {
            const newWindow = window.open('about:blank', '_blank');
            newWindow.document.write(`
                <html>
                    <head>
                        <style>
                            html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; }
                            iframe { border: none; width: 100%; height: 100%; display: block; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${url}"></iframe>
                    </body>
                </html>
            `);
            newWindow.document.close();
        }

        document.addEventListener("click", function(e) {
            const target = e.target.closest("a[href]");
            if (target) {
                const blankEnabled = getCookie("Blank") === "true";
                if (blankEnabled) {
                    e.preventDefault();
                    openInAboutBlank(target.href);
                }
            }
        });
    })();
</script>
</head><body><div id="app"></div></body></html>
